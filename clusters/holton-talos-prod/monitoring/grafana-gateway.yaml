apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana-gateway
  namespace: monitoring
spec:
  gatewayClassName: cilium
  listeners:
  - name: https
    hostname: boards.holton.xyz
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: boards-holton-xyz-cert
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Same
