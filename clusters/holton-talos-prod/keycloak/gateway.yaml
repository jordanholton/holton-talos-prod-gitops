apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: keycloak-gateway
  namespace: keycloak
spec:
  gatewayClassName: cilium
  listeners:
  - name: https
    hostname: sso.holton.xyz
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: sso-holton-xyz-cert
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Same
