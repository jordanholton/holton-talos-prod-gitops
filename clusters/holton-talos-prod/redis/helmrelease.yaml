apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: redis-ha
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: dandydeveloper
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  targetNamespace: redis
  values:
    replicas: 3

    redis:
      masterGroupName: holton-prod
      config:
        maxmemory: 512mb
        maxmemory-policy: allkeys-lru

    sentinel:
      port: 26379
      quorum: 2

    auth: false

    persistentVolume:
      enabled: true
      size: 8Gi
      storageClass: nfs-csi

    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    serviceType: LoadBalancer
