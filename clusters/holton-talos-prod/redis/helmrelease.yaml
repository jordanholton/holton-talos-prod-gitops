apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: redis
      version: ">=20.0.0 <21.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  targetNamespace: redis
  values:
    global:
      imageRegistry: "ghcr.io"
      security:
        allowInsecureImages: true

    architecture: replication

    auth:
      enabled: true

    sentinel:
      enabled: true
      masterSet: holton-prod
      quorum: 2
      service:
        type: LoadBalancer

    master:
      count: 1
      persistence:
        enabled: true
        size: 8Gi
        storageClass: nfs-csi
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    replica:
      replicaCount: 3
      persistence:
        enabled: true
        size: 8Gi
        storageClass: nfs-csi
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"
